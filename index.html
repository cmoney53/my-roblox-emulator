<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Emulator Alpha</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Roblox-ish Alpha</h1>
        <p>Use <b>WASD</b> to Move | <b>Space</b> to Jump</p>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky Blue

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. THE BASEPLATE (The Floor)
        const gridHelper = new THREE.GridHelper(100, 100, 0x000000, 0x000000);
        scene.add(gridHelper);

        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
        const baseplate = new THREE.Mesh(floorGeo, floorMat);
        baseplate.rotation.x = -Math.PI / 2;
        scene.add(baseplate);

        // 3. THE PLAYER (The "Noob" Cube)
        const playerGeo = new THREE.BoxGeometry(1, 2, 1);
        const playerMat = new THREE.MeshPhongMaterial({ color: 0xffff00 });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.y = 1; // Sit on top of floor
        scene.add(player);

        // LIGHTING
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 4. MOVEMENT LOGIC
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        let velocityY = 0;
        const gravity = -0.01;

        function animate() {
            requestAnimationFrame(animate);

            // Movement
            if (keys['KeyW']) player.position.z -= 0.1;
            if (keys['KeyS']) player.position.z += 0.1;
            if (keys['KeyA']) player.position.x -= 0.1;
            if (keys['KeyD']) player.position.x += 0.1;

            // Simple Jump Physics
            if (keys['Space'] && player.position.y <= 1.01) {
                velocityY = 0.2;
            }
            
            player.position.y += velocityY;
            if (player.position.y > 1) {
                velocityY += gravity;
            } else {
                player.position.y = 1;
                velocityY = 0;
            }

            // Camera follow
            camera.position.set(player.position.x, player.position.y + 5, player.position.z + 10);
            camera.lookAt(player.position);

            renderer.render(scene, camera);
        }

        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
